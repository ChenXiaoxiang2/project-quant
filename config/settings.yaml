email:
  smtp_server: "smtp.163.com"
  smtp_port: 465
  sender_email: "17051196422@163.com"
  recipient_email: "17051196422@163.com"

data_sources:
  realtime:
    - TencentDataLoader
    - SinaDataLoader
    - AKShare
  historical:
    - BaostockDataLoader
    - AKShare
    - TencentDataLoader

# 智能选股参数
screener:
  roe_min: 10.0
  gross_margin_min: 20.0
  debt_ratio_max: 60.0
  profit_growth_min: 0.0
  volume_boost_min: 1.5
  price_change_max: 9.0
  rsi_max: 70.0
  top_n: 50

# 策略参数
strategy:
  ma_short: 5
  ma_mid: 20
  ma_long: 60
  adx_threshold: 25
  volume_multiplier: 1.5
  atr_multiplier: 2.0
  max_risk_pct: 0.02

# 告警参数
alerts:
  enabled: true
  poll_interval: 30
  cooldown_min: 60
  price_change_threshold: 5.0

# 资讯参数
news:
  sources:
    - cls
    - sina
    - eastmoney
  sentiment_threshold: 0.2
  days_to_keep: 7

# 钉钉推送
dingtalk:
  enabled: false
  webhook: ""

storage:
  path: "./data"
  db_news: "./data/news.db"
  db_alerts: "./data/alerts.db"
  reports: "./reports"

network:
  disable_proxy: true
  request_timeout: 10
  max_retries: 3
